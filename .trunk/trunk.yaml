# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yam
version: 0.1
cli:
  version: 1.25.0
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins
plugins:
  sources:
    - id: trunk
      ref: v1.8.0
      uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes
runtimes:
  enabled:
    - node@22.16.0
    - python@3.14.4
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration
lint:
  ignore:
    - linters:
        - ALL
      paths:
        - raidho-traefik/tests/**
        - raidho-traefik/templates/**
        - raidho-traefik/crds/**
  enabled:
    - actionlint@1.7.12
    - checkov@3.2.526
    - git-diff-check
    - markdownlint@0.48.0
    - prettier@3.8.3
    - trufflehog@3.95.2
    - yamllint@1.38.0
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
tools:
  enabled:
    - gh@2.92.0
    - markdown-link-check@3.14.2
    - action-validator@0.9.0
    - dotenv-linter@4.0.0
    - kube-linter@0.7.2
    - kubectl@1.25.16
    - helm@3.9.4
